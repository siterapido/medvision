name: CI
on:
  pull_request:
  push:
    branches: [main, master]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
        env:
          # Stubs públicos mínimos para o next build (sem secrets).
          # Supabase legado removido — auth atual é Neon (.env.example).
          NEXT_PUBLIC_NEON_AUTH_BASE_URL: http://localhost:3000
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          NEXT_PUBLIC_APP_URL: http://localhost:3000
